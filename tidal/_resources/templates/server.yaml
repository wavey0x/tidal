# Generated by `tidal-server init-config`.
# This file is the tracked, authoritative server runtime config.
# Keep secrets in a sibling .env or point TIDAL_ENV_FILE somewhere outside Git.
# Set TIDAL_HOME in the service environment if you want mutable state outside the repo checkout.

# Runtime and API service settings.
chain_id: 1
tidal_api_host: "0.0.0.0"
tidal_api_port: 8787
tidal_api_receipt_reconcile_interval_seconds: 30
tidal_api_receipt_reconcile_threshold_seconds: 60
tidal_api_cors_allowed_origins: []

# Scanner and execution settings.
scan_interval_seconds: 300
scan_concurrency: 20
scan_auto_settle_enabled: false
auction_kicker_address: "0x846475a1B97AC57861813206749c1b0f592383eF"
txn_usd_threshold: 100
txn_max_base_fee_gwei: 0.5
txn_max_priority_fee_gwei: 2
txn_max_gas_limit: 500000
