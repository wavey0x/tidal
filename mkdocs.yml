site_name: Tidal Docs
site_url: https://docs.tidal.wavey.info
site_description: Documentation for the Tidal auction operations stack.
repo_url: https://github.com/wavey0x/tidal

theme:
  name: material
  logo: assets/tidal-logo-light.svg
  favicon: assets/tidal-logo-dark.svg
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Getting Started:
    - Local Development: local-dev.md
    - Operator Guide: operator-guide.md
    - Server Operations: server-ops.md
  - Reference:
    - CLI: cli-reference.md
    - API: api-reference.md
    - Configuration: config.md
  - Concepts:
    - Pricing: pricing.md
    - Kick Selection: kick-selection.md
    - Glossary: glossary.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
