# Secrets (RPC_URL, keystore, Telegram tokens) belong in .env, not here.
# Any key here can be overridden by setting the equivalent env var.

# ── General ──────────────────────────────────────────
db_path: ./factory_dashboard.db
chain_id: 1

# ── Scanner ──────────────────────────────────────────
scan_interval_seconds: 300
scan_concurrency: 20
rpc_timeout_seconds: 10
rpc_retry_attempts: 3

# ── Multicall ────────────────────────────────────────
multicall_enabled: true
multicall_address: "0xca11bde05977b3631167028862be2a173976ca11"
multicall_discovery_batch_calls: 800
multicall_rewards_batch_calls: 500
multicall_rewards_index_max: 16
multicall_balance_batch_calls: 1000
multicall_overflow_queue_max: 32
multicall_auction_batch_calls: 100

# ── Auctions ─────────────────────────────────────────
auction_factory_address: "0xbA7FCb508c7195eE5AE823F37eE2c11D7ED52F8e"

# ── Pricing ──────────────────────────────────────────
price_refresh_enabled: true
token_price_agg_base_url: https://prices.wavey.info
price_timeout_seconds: 10
price_retry_attempts: 3
price_concurrency: 10
price_delay_seconds: 0

# ── Alerts ───────────────────────────────────────────
telegram_alerts_enabled: false

# ── Transaction Service ──────────────────────────────
auction_kicker_address: "0x2a76c6ad151af2edbe16755fc3bff67176f01071"
txn_usd_threshold: 100
txn_max_fee_per_gas_gwei: 50
txn_max_base_fee_gwei: 0.5
txn_max_priority_fee_gwei: 2
txn_max_gas_limit: 500000
txn_start_price_buffer_bps: 1000
txn_min_price_buffer_bps: 500
txn_max_data_age_seconds: 600
txn_cooldown_seconds: 3600
