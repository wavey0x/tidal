site_name: Tidal Docs
site_url: https://docs.tidal.wavey.info
site_description: Documentation for the Tidal auction operations stack.
repo_url: https://github.com/wavey0x/tidal

theme:
  name: material
  logo: assets/tidal-logo-light.svg
  favicon: assets/tidal-logo-dark.svg
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Getting Started:
    - Overview: index.md
    - Install: install.md
  - Guides:
    - Local Development: local-dev.md
    - CLI Client Guide: operator-guide.md
    - Server Operator Guide: server-ops.md
  - Reference:
    - CLI:
      - Overview: cli-reference.md
      - CLI Client:
        - Overview: cli-client-reference.md
        - Init (`tidal init`): cli-client-init.md
        - Kick (`tidal kick`): cli-client-kick.md
        - Auction (`tidal auction`): cli-client-auction.md
        - Logs (`tidal logs`): cli-client-logs.md
      - Server Operator:
        - Overview: cli-server-reference.md
        - DB (`tidal-server db`): cli-server-db.md
        - Scan (`tidal-server scan`): cli-server-scan.md
        - API (`tidal-server api`): cli-server-api.md
        - Auth (`tidal-server auth`): cli-server-auth.md
        - Kick (`tidal-server kick`): cli-server-kick.md
        - Auction (`tidal-server auction`): cli-server-auction.md
        - Logs (`tidal-server logs`): cli-server-logs.md
    - API: api-reference.md
    - Configuration: config.md
  - Architecture: architecture.md
  - Concepts:
    - Pricing: pricing.md
    - Kick Selection: kick-selection.md
    - Glossary: glossary.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
